        <h1>Dancing plague of 1518</h1>
        <p>The dancing plague of 1518, or dance epidemic of 1518 (French: Épidémie dansante de 1518; German: Straßburger Tanzwut), was a case of dancing mania that occurred in Strasbourg, Alsace (modern-day France), in the Holy Roman Empire from July 1518 to September 1518. Somewhere between 50 and 400 people took to dancing for weeks. There are many theories behind the phenomenon, the most popular being stress-induced mass hysteria, suggested by John Waller.[1][2] Other theories include ergot poisoning. There is controversy concerning the number of deaths.</p>
        <h2>Events</h2>
        <p>The outbreak began in July 1518 when a woman known as Frau Troffea and her daughter Fräulein Emma Götz began to dance fervently and uncontrollably in a street in Strasbourg. According to Ned Pennant-Rea, "Frau Troffea had started dancing on July 14th on the narrow cobbled street outside her half-timbered home. As far as we can tell she had no musical accompaniment but simply 'began to dance' ... some of those who had witnessed her strange performance had begun to mimic her, and within days more than thirty choreomaniacs were in motion, some so monomaniacally that only death would have the power to intervene."[3][1] Troffea kept up the constant dancing for a week. Soon, three dozen others joined in.[4] This is known and believed by some to be a perfect example of a nocebo effect which can make some feel ill simply by being under the expectation of being ill. By August, the "dancing plague" had claimed 400 victims.[4] Dancers were beginning to collapse. It is said some even died from a stroke or heart attack.[4] The victims' movements were described as spasmatic with many convulsions and their bodies were left drenched in sweat. Their arms would thrash violently and some noted that their eyes were vacant and expressionless. Blood would pool into their swollen feet and they would eventually bleed into their shoes. Often, there would also be cries for help from the affected. If the victims did not succumb to a heart attack, they would collapse from extreme exhaustion, hunger, and thirst. There were as many as 15 deaths per day during the outbreak’s peak, but the final number of fatalities is unknown today.[5] No one knew what caused this reaction, which meant no one understood how to remedy it. By early September, the outbreak began to subside.[6][4]

Historical documents, including "physician notes, cathedral sermons, local and regional chronicles, and even notes issued by the Strasbourg city council" are clear that the victims danced;[1] it is not known why. Historical sources agree that there was an outbreak of dancing after a single woman started dancing,[7] and the dancing did not seem to die down. It lasted for such a long time that it even attracted the attention of the authorities; until the council gave up authority to the physicians, who prescribed the afflicted to "dance themselves free of it."[3] There are claims that guild halls were refurbished to accommodate the dancing, as well as musicians and strong people to help keep those dealing with the dancing mania to stay upright.[3] This backfired, and the council was forced to ban public dancing as people danced in fear it was a punishment from Saint Vitus; and to be "free of sin" many joined in on the dancing epidemic.[3] When divine punishment or demonic possession initiated and sustained frenzied dancing, only those with divinely bestowed authority could restore the sinners to wholeness and to a right relationship with the divine.[8] The council went as far as to ban music, as well.[3] Those who danced were then ordered to go to the shrine of Saint Vitus believed to punish sinners by compelling them to dance uncontrollably,[9] wore red shoes that were sprinkled with holy water and had painted crosses on the tops and soles.[3] They also had to hold small crosses in their hands; and incense and Latin incantations were part of this "ritual."[3] Apparently "forgiven by Vitus," word was spread of a successful ritual and the Dancing Plague had ended in September when the remaining dancers were taken to a mountaintop to pray for absolution.[10][3]

Events similar to this are said to have occurred throughout the medieval age including 11th century in Cölbigk, Saxony, where it was believed to be the result of divine judgment.[11] In 15th century Apulia, Italy,[12] a woman was bitten by a tarantula, the venom making her dance convulsively. The only way to cure the bite was to "shimmy" and to have the right sort of music available, which was an accepted remedy by scholars like Athanasius Kircher.[13]

Contemporaneous explanations included demonic possession and overheated blood.</p>
